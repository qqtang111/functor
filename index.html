<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/functor-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="An elegant math function visualization tool with 2D/3D plotting" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Functor" />
    <title>Functor — 数学函数可视化</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,600;1,600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/stylesheet.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-mono/stylesheet.min.css" rel="stylesheet" />
    <style>
      body { transition: opacity 0.2s; }
      #error-catcher { display: none; position: fixed; inset: 0; z-index: 99999; background: #0a0a1a; color: #ff6b6b; padding: 40px; font-family: monospace; font-size: 14px; white-space: pre-wrap; overflow: auto; }
    </style>
    <script>
      window.__errors = [];
      window.onerror = function(msg, url, line, col, err) {
        window.__errors.push(msg + ' at ' + line + ':' + col);
        var el = document.getElementById('error-catcher');
        if (el) { el.style.display = 'block'; el.textContent = 'JS ERROR:\n' + window.__errors.join('\n'); }
      };
    </script>
  </head>
  <body>
    <div id="error-catcher"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
