# Functor Backend — Cloudflare Workers + D1
# 部署命令: wrangler deploy
# 本地开发: wrangler dev

name = "functor-api"
main = "src/index.ts"
compatibility_date = "2025-06-01"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "functor-db"
database_id = "fb821840-4ce0-4174-a6ba-577f4e70397f"

# 环境变量
[vars]
CORS_ORIGIN = "*"

# 开发环境
[env.dev]
[env.dev.vars]
CORS_ORIGIN = "http://localhost:5173,http://localhost:8787"
