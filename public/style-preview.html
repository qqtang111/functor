<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Functor UI 风格预览</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0a0f;color:#fff;padding:20px}
h1{text-align:center;font-size:28px;margin-bottom:8px;letter-spacing:-1px}
.sub{text-align:center;color:#888;margin-bottom:24px;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;max-width:1400px;margin:0 auto}
.card{border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;border:2px solid transparent}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.card.selected{border-color:#fff}
.preview{height:200px;display:flex;position:relative}
.side{width:120px;padding:12px 10px;display:flex;flex-direction:column;gap:6px;border-right:1px solid rgba(255,255,255,.1)}
.side-item{height:10px;border-radius:3px}
.side-title{height:6px;width:50%;border-radius:3px;margin-bottom:2px}
.canvas{flex:1;position:relative;overflow:hidden}
.curve{position:absolute;border-radius:50%;width:120px;height:120px;border:2px solid;bottom:20px;left:50%;transform:translateX(-50%) rotateX(60deg)}
.dot{position:absolute;border-radius:50%;width:6px;height:6px}
.grid-line{position:absolute;height:1px;width:100%}
.info{padding:16px;display:flex;justify-content:space-between;align-items:start}
.info h3{font-size:16px;margin-bottom:4px}
.info p{font-size:11px;opacity:.6;line-height:1.5}
.colors{display:flex;gap:4px;margin-top:8px}
.color-dot{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,.2)}
.choose{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid;background:transparent;cursor:pointer;white-space:nowrap}
.choose:hover{opacity:.8}
</style></head><body>
<h1>🎨 Functor UI 视觉风格预览</h1><p class="sub">点击卡片选择风格 — 5种设计 × 数学可视化工具</p>
<div class="grid" id="grid"></div>

<script>
const styles=[
{name:"暗黑高级",en:"Dark Premium",desc:"沉稳高级 · 金色点缀 · 神秘学术感 · 适合权威型工具",style:{bg:"#0F0F0F",card:"#1A1A1A",accent:"#D4AF37",accent2:"#B8860B",text:"#FFFFFF",muted:"#666",border:"rgba(255,255,255,0.08)",curve:"#D4AF37"}},
{name:"极简科技",en:"Corporate Cyan",desc:"干净理性 · 青色主调 · 学生教师友好 · 效率优先",style:{bg:"#0F172A",card:"#1E3A8A",accent:"#06B6D4",accent2:"#0EA5E9",text:"#E2E8F0",muted:"#64748B",border:"rgba(255,255,255,0.08)",curve:"#06B6D4"}},
{name:"几何未来",en:"Geometric Modern",desc:"多彩数学 · 紫蓝渐变 · 年轻活力 · 几何美感",style:{bg:"#0B0E14",card:"#1E1E2E",accent:"#818CF8",accent2:"#06B6D4",text:"#E4E4E7",muted:"#71717A",border:"rgba(255,255,255,0.06)",curve:"#818CF8"}},
{name:"白昼学术",en:"Scandinavian Light",desc:"白色基底 · 高清可读 · 教学投影友好 · 教科书风",style:{bg:"#FFFFFF",card:"#F5F5F5",accent:"#2563EB",accent2:"#3B82F6",text:"#0F172A",muted:"#94A3B8",border:"rgba(0,0,0,0.08)",curve:"#2563EB"}},
{name:"赛博霓虹",en:"Cyberpunk Neon",desc:"黑客帝国 · 霓虹发光 · 极客酷炫 · 暗色网格",style:{bg:"#0A0A0F",card:"#111122",accent:"#00FF88",accent2:"#FF00FF",text:"#CCCCDD",muted:"#555566",border:"rgba(0,255,136,0.1)",curve:"#00FF88"}}
];

const grid=document.getElementById('grid');
styles.forEach((s,i)=>{
const t=s.style;
const card=document.createElement('div');
card.className='card';
card.id='card-'+i;
card.innerHTML=`
<div class="preview" style="background:${t.bg}">
<div class="side" style="background:${t.card};border-color:${t.border}">
<div class="side-title" style="background:${t.muted}"></div>
<div class="side-item" style="background:${t.accent};opacity:.3;width:80%"></div>
<div class="side-item" style="background:${t.accent};opacity:.5;width:65%"></div>
<div class="side-item" style="background:${t.muted};width:90%"></div>
<div class="side-item" style="background:${t.muted};width:55%"></div>
<div class="side-title" style="background:${t.muted};width:40%;margin-top:6px"></div>
<div class="side-item" style="background:${t.accent};opacity:.2;width:70%"></div>
<div class="side-item" style="background:${t.accent};opacity:.35;width:60%"></div>
</div>
<div class="canvas" style="background:${t.bg}">
${[...Array(6)].map((_,j)=>`<div class="grid-line" style="top:${20+j*28}px;background:${t.border}"></div>`).join('')}
<div class="curve" style="border-color:${t.accent};opacity:.6"></div>
<div class="curve" style="border-color:${t.accent2};opacity:.4;width:100px;height:100px;bottom:30px;left:40%"></div>
<div class="dot" style="background:${t.accent};top:80px;left:55%;opacity:.8;box-shadow:0 0 8px ${t.accent}"></div>
</div>
</div>
<div class="info" style="background:${t.card};color:${t.text}">
<div><h3 style="color:${t.accent}">${s.name} <span style="font-weight:400;font-size:11px;opacity:.6">${s.en}</span></h3><p>${s.desc}</p>
<div class="colors">${[t.bg,t.card,t.accent,t.accent2,t.text].map(c=>`<div class="color-dot" style="background:${c}"></div>`).join('')}</div>
</div>
<button class="choose" style="color:${t.accent};border-color:${t.accent}" onclick="select(${i})">选择</button>
</div>`;
grid.appendChild(card);
});

function select(i){alert('已选择: '+styles[i].name+'\n记下编号 '+(i+1)+'，告诉我要用这个风格！');document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));document.getElementById('card-'+i).classList.add('selected');}
</script></body></html>
